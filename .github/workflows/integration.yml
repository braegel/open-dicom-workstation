name: Integration
on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
jobs:
  orthanc:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Start Orthanc
        run: |
          docker run -d --name orthanc --network host \
            -e ORTHANC__AUTHENTICATION_ENABLED=false \
            -e ORTHANC__DICOM_ALWAYS_ALLOW_FIND=true \
            -e ORTHANC__DICOM_ALWAYS_ALLOW_GET=true \
            -e ORTHANC__DICOM_ALWAYS_ALLOW_MOVE=true \
            -e ORTHANC__DICOM_MODALITIES='{"odw": ["ODWMOVE", "127.0.0.1", 11199]}' \
            orthancteam/orthanc
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:8042/system; do sleep 2; done'
      - run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 libfontconfig1
      - run: uv sync --group dev
      - run: ODW_ORTHANC_HOST=127.0.0.1 ODW_ORTHANC_MOVE_AET=ODWMOVE ODW_ORTHANC_MOVE_PORT=11199 uv run pytest -m integration -q
